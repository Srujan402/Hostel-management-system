{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMS Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #1f3c88, #39a0ed);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* MAIN BOX */
        .container-box {
            width: 900px;
            height: 550px;
            display: flex;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            animation: fadeIn 0.8s ease;
        }

        /* LEFT SIDE (IMAGE) */
        .left-panel {
            flex: 1;
            background: url("{% static 'images/hostel.jpg' %}") no-repeat center center/cover;
            position: relative;
        }

        /* LIGHT OVERLAY (NOT DARK) */
        .left-panel::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.2); /* LIGHT */
        }

        /* TEXT */
        .left-content {
            position: relative;
            z-index: 2;
            padding: 50px;
            color: #0d2c54;
        }

        .left-content h2 {
            font-weight: 700;
            font-size: 2rem;
        }

        .left-content p {
            margin-top: 10px;
            font-size: 1rem;
        }

        /* RIGHT SIDE */
        .right-panel {
            flex: 1;
            background: #ffffff;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .login-header i {
            font-size: 2.5rem;
            color: #1f3c88;
        }

        .login-header h3 {
            margin-top: 10px;
            font-weight: 600;
        }

        /* INPUTS */
        .form-control {
            border-radius: 10px;
            padding: 12px;
        }

        /* BUTTON */
        .btn-login {
            background: linear-gradient(135deg, #1f3c88, #39a0ed);
            border: none;
            border-radius: 30px;
            padding: 12px;
            color: white;
            margin-top: 15px;
            transition: 0.3s;
        }

        .btn-login:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(57,160,237,0.4);
        }

        /* FOOTER */
        .login-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: gray;
        }

        /* ANIMATION */
        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(30px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>

<div class="container-box">

    <!-- LEFT SIDE -->
    <div class="left-panel">
        <div class="left-content">
            <h2>Welcome to HMS</h2>
            <p>Hostel Management System helps you manage students, rooms, complaints and more easily.</p>
        </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right-panel">

        <div class="login-header">
            <i class="bi bi-building"></i>
            <h3>Login</h3>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label>Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>

            <div class="mb-3 position-relative">
                <label>Password</label>
                <input type="password" id="password" name="password" class="form-control" required>
                <i class="bi bi-eye" onclick="togglePassword()" 
                   style="position:absolute; right:10px; top:40px; cursor:pointer;"></i>
            </div>

            <button class="btn btn-login w-100">
                <i class="bi bi-box-arrow-in-right"></i> Login
            </button>
        </form>

        

    </div>

</div>

<script>
function togglePassword() {
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
