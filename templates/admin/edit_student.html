{% extends 'base.html' %}

{% block title %}Edit Student{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>Edit Student</h2>

    <form method="post">
        {% csrf_token %}

        <!-- USER INFO -->
        <div class="row">
            <div class="col-md-6">
                <label>First Name</label>
                <input type="text" name="first_name" class="form-control" value="{{ student.user.first_name }}" required>
            </div>
            <div class="col-md-6">
                <label>Last Name</label>
                <input type="text" name="last_name" class="form-control" value="{{ student.user.last_name }}" required>
            </div>
        </div>

        <div class="mt-3">
            <label>Email</label>
            <input type="email" name="email" class="form-control" value="{{ student.user.email }}" required>
        </div>

        <!-- STUDENT INFO -->
        <div class="mt-3">
            <label>Roll Number</label>
            <input type="text" name="roll_number" class="form-control" value="{{ student.roll_number }}" required>
        </div>

        <div class="mt-3">
            <label>Phone</label>
            <input type="text" name="phone" class="form-control" value="{{ student.phone }}" required>
        </div>

        <div class="mt-3">
            <label>Gender</label>
            <select name="gender" class="form-control" required>
                <option value="M" {% if student.gender == 'M' %}selected{% endif %}>Male</option>
                <option value="F" {% if student.gender == 'F' %}selected{% endif %}>Female</option>
                <option value="O" {% if student.gender == 'O' %}selected{% endif %}>Other</option>
            </select>
        </div>

        <div class="mt-3">
            <label>Date of Birth</label>
            <input type="date" name="date_of_birth" class="form-control"
                   value="{{ student.date_of_birth|date:'Y-m-d' }}" required>
        </div>

        <!-- ADDRESS -->
        <div class="mt-3">
            <label>Address</label>
            <textarea name="address" class="form-control" required>{{ student.address }}</textarea>
        </div>

        <div class="row mt-3">
            <div class="col-md-4">
                <label>City</label>
                <input type="text" name="city" class="form-control" value="{{ student.city }}" required>
            </div>
            <div class="col-md-4">
                <label>State</label>
                <input type="text" name="state" class="form-control" value="{{ student.state }}" required>
            </div>
            <div class="col-md-4">
                <label>Pincode</label>
                <input type="text" name="pincode" class="form-control" value="{{ student.pincode }}" required>
            </div>
        </div>

        <!-- GUARDIAN -->
        <div class="mt-3">
            <label>Guardian Name</label>
            <input type="text" name="guardian_name" class="form-control" value="{{ student.guardian_name }}" required>
        </div>

        <div class="mt-3">
            <label>Guardian Phone</label>
            <input type="text" name="guardian_phone" class="form-control" value="{{ student.guardian_phone }}" required>
        </div>

        <div class="mt-3">
            <label>Emergency Contact</label>
            <input type="text" name="emergency_contact" class="form-control" value="{{ student.emergency_contact }}" required>
        </div>

        <div class="mt-4">
            <button type="submit" class="btn btn-success">Update</button>
            <a href="{% url 'student_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
