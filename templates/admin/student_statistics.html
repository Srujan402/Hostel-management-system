{% extends 'base.html' %}

{% block title %}Student Statistics{% endblock %}

{% block content %}
<div class="container-fluid">

    <h2 class="mb-4">Student Statistics</h2>

    <div class="row">

        <div class="col-md-4">
            <div class="card text-white bg-primary mb-3">
                <div class="card-body">
                    <h5>Total Students</h5>
                    <h3>{{ total_students }}</h3>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-white bg-success mb-3">
                <div class="card-body">
                    <h5>Active Students</h5>
                    <h3>{{ active_students }}</h3>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-white bg-danger mb-3">
                <div class="card-body">
                    <h5>Inactive Students</h5>
                    <h3>{{ inactive_students }}</h3>
                </div>
            </div>
        </div>

    </div>

</div>
{% endblock %}
