{% extends 'base.html' %}

{% block title %}Add Room - Hostel Management System{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="mb-4">
        <h2><i class="bi bi-door-closed"></i> Add New Room</h2>
    </div>

    <div class="row">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="room_number" class="form-label">Room Number</label>
                            <input type="text" class="form-control" id="room_number" name="room_number" required>
                        </div>

                        <div class="mb-3">
                            <label for="floor" class="form-label">Floor</label>
                            <input type="number" class="form-control" id="floor" name="floor" min="1" required>
                        </div>

                        <div class="mb-3">
                            <label for="capacity" class="form-label">Capacity (Number of Beds)</label>
                            <input type="number" class="form-control" id="capacity" name="capacity" min="1" required>
                        </div>

                        <div class="mb-3">
                            <label for="rent" class="form-label">Monthly Rent (₹)</label>
                            <input type="number" class="form-control" id="rent" name="rent" step="0.01" min="0" required>
                        </div>

                        <div class="mt-4">
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-check-circle"></i> Add Room
                            </button>
                            <a href="{% url 'room_list' %}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
